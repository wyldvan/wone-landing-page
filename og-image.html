<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>OG Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background: linear-gradient(135deg, #280058 0%, #0d0020 60%, #1a0040 100%);
            border-top: 6px solid #00FED9;
            font-family: 'Inter', sans-serif;
            color: #FDFEFC;
            display: flex;
            position: relative;
            box-sizing: border-box;
        }

        .left-col {
            padding: 80px;
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .badge {
            color: #00FED9;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .logo-circle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 254, 217, 0.3);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
        }

        .main-title {
            font-size: 52px;
            font-weight: 800;
            color: #FDFEFC;
            line-height: 1.15;
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            white-space: pre-line;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(253, 254, 252, 0.55);
            margin-top: 20px;
            margin-bottom: 0;
        }

        .footer-url {
            color: #00FED9;
            font-size: 16px;
            position: absolute;
            bottom: 48px;
            font-weight: 500;
        }

        .right-col {
            width: 40%;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-dashboard {
            width: 340px;
            height: 240px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 254, 217, 0.25);
            border-radius: 16px;
            padding: 24px;
            box-sizing: border-box;
            position: relative;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .status-online {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00FED9;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .status-online::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background: #00FED9;
            border-radius: 50%;
        }

        .metrics-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            flex: 1;
        }

        .metric-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 14px;
            color: #00FED9;
            font-weight: 600;
        }

        .chart-svg {
            width: 100%;
            height: 60px;
        }

        /* Elementos Decorativos */
        .circle-large {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(0, 254, 217, 0.08);
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .circle-medium {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 1px solid rgba(0, 254, 217, 0.08);
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="left-col">
        <div class="badge">✦ SISTEMA COMPLETO</div>
        <div class="logo-area">
            <img src="./favicon.png" alt="Wone" class="logo-circle">
            <div class="logo-text">Wone Sistemas</div>
        </div>
        <h1 class="main-title">Automatize e acelere<br>seu negócio.</h1>
        <p class="subtitle">PDV · NFE · Loja Virtual · Estoque · e mais</p>
        <div class="footer-url">wonesistemas.com.br</div>
    </div>

    <div class="right-col">
        <div class="mini-dashboard">
            <div class="status-online">Online</div>
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">VENDAS</div>
                    <div class="metric-value">R$ 15.4K</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">PEDIDOS</div>
                    <div class="metric-value">1,204</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">RECEITA</div>
                    <div class="metric-value">↑ 12%</div>
                </div>
            </div>

            <svg class="chart-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
                <path d="M0,50 C20,50 40,20 60,30 C80,40 100,10 120,20 C140,30 160,5 200,15" fill="none"
                    stroke="#00FED9" stroke-width="2" />
                <circle cx="200" cy="15" r="3" fill="#00FED9" />
            </svg>
        </div>
    </div>

    <!-- Círculos decorativos bg -->
    <div class="circle-large"></div>
    <div class="circle-medium"></div>

</body>

</html>
