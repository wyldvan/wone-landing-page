<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>OG Image - Wone Sistemas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background: linear-gradient(135deg, #11002b 0%, #280058 50%, #0d0020 100%);
            border-bottom: 8px solid #00FED9;
            font-family: 'Inter', sans-serif;
            color: #FDFEFC;
            display: flex;
            position: relative;
            box-sizing: border-box;
        }

        .decorative-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 254, 217, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -200px;
            right: -200px;
            z-index: 0;
            pointer-events: none;
        }

        .left-col {
            padding: 80px 40px 80px 80px;
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 254, 217, 0.1);
            color: #00FED9;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 32px;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid rgba(0, 254, 217, 0.2);
            width: max-content;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .logo-img {
            max-height: 50px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .main-title {
            font-size: 58px;
            font-weight: 800;
            color: #FDFEFC;
            line-height: 1.15;
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            white-space: pre-line;
        }

        .text-highlight {
            color: #00FED9;
        }

        .subtitle {
            font-size: 20px;
            color: rgba(253, 254, 252, 0.7);
            margin-top: 24px;
            line-height: 1.5;
            margin-bottom: 0;
            max-width: 90%;
        }

        .footer-url {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: #FDFEFC;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-url span {
            color: #00FED9;
        }

        .right-col {
            width: 45%;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-dashboard {
            width: 360px;
            height: 260px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 254, 217, 0.25);
            border-radius: 16px;
            padding: 24px;
            box-sizing: border-box;
            position: relative;
            backdrop-filter: blur(10px);
            z-index: 20;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .status-online {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00FED9;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .status-online::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background: #00FED9;
            border-radius: 50%;
            box-shadow: 0 0 10px #00FED9;
        }

        .metrics-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 14px;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 16px;
            color: #00FED9;
            font-weight: 700;
        }

        .chart-svg {
            width: 100%;
            height: 70px;
        }

        /* Elementos Decorativos */
        .circle-large {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 254, 217, 0.15);
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .circle-medium {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 254, 217, 0.15);
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="decorative-glow"></div>
    <div class="circle-large"></div>
    <div class="circle-medium"></div>

    <div class="left-col">
        <div class="logo-area">
            <img src="./assets/logo.png" alt="Wone Sistemas" class="logo-img">
        </div>

        <div class="badge">✦ SISTEMA COMPLETO</div>

        <h1 class="main-title">Acesse o sistema de <br><span class="text-highlight">onde estiver.</span></h1>
        <p class="subtitle">Gestão inteligente e completa para PDV, Financeiro, Estoque e Loja Virtual em um só lugar.
        </p>

        <div class="footer-url">
            🌐 <span>wonesistemas.com.br</span>
        </div>
    </div>

    <div class="right-col">
        <div class="mini-dashboard">
            <div class="status-online">Online</div>
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">VENDAS</div>
                    <div class="metric-value">R$ 15.4K</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">PEDIDOS</div>
                    <div class="metric-value">1,204</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">RECEITA</div>
                    <div class="metric-value">↑ 12%</div>
                </div>
            </div>

            <svg class="chart-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
                <path d="M0,50 C20,50 40,20 60,30 C80,40 100,10 120,20 C140,30 160,5 200,15" fill="none"
                    stroke="#00FED9" stroke-width="3" />
                <circle cx="200" cy="15" r="4" fill="#00FED9" />
            </svg>
        </div>
    </div>

</body>

</html>
